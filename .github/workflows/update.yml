name: Update Dataset

on:
  schedule:
    - cron: '0 9 * * *'  # todo dia às 09h (UTC)
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python + Kaggle
        run: |
          pip install kaggle

      - name: Setup Kaggle API
        run: |
          mkdir -p ~/.kaggle
          echo '${{ secrets.KAGGLE_JSON }}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Download dataset
        run: python scripts/download_kaggle.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Atualização automática do dataset" || echo "Sem mudanças"
          git push
